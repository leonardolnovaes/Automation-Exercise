name: Run Cypress Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write 

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Cypress binary
        run: npx cypress install

      - name: Run Cypress (all tests)
        run: npm run cy:run

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore

  generate-report:
    needs: run-tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Allure Results
        uses: actions/download-artifact@v3
        with:
          name: allure-results
          path: allure-results

      - name: Check Allure Results presence
        id: has_results
        run: |
          if [ -d "allure-results" ] && [ "$(ls -A allure-results | wc -l)" -gt "0" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Allure CLI
        if: steps.has_results.outputs.found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jre-headless
          curl -L -o allure.tgz https://github.com/allure-framework/allure2/releases/download/2.21.0/allure-2.21.0.tgz
          sudo tar -zxvf allure.tgz -C /opt/
          sudo ln -sf /opt/allure-2.21.0/bin/allure /usr/bin/allure

      - name: Generate Allure Report
        if: steps.has_results.outputs.found == 'true'
        run: allure generate allure-results --clean -o allure-report

      - name: Deploy Allure Report to GitHub Pages
        if: steps.has_results.outputs.found == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          commit_message: "Deploy Allure Report"
          keep_files: true
